name: Check Lock Files

on:
  pull_request:
    paths:
      - '.github/workflows/**.md'
      - '.github/workflows/**.lock.yml'

permissions:
  contents: read

jobs:
  check-lock-files:
    name: Verify lock files are compiled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gh-aw
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Recompile workflows
        run: gh aw compile

      - name: Check for uncommitted lock file changes
        run: |
          if ! git diff --exit-code '.github/workflows/*.lock.yml'; then
            echo "::error::Lock files are out of sync with their .md sources. Run 'gh aw compile' and commit the updated .lock.yml files."
            exit 1
          fi
